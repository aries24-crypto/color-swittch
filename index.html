<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Switch - Space to Jump</title>
    <style>
        :root { --bg-color: #121212; --text-color: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 400px; height: 100%; max-height: 800px; background: #000; border-left: 1px solid #333; border-right: 1px solid #333; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { position: absolute; top: 30px; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #score { font-size: 60px; font-weight: 800; opacity: 0.8; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; backdrop-filter: blur(5px); }
        #menu.hidden { display: none; }
        h1 { font-size: 36px; margin-bottom: 10px; letter-spacing: 4px; color: #FF0080; }
        p.instructions { margin-bottom: 30px; color: #aaa; font-size: 14px; }
        .btn { padding: 18px 50px; font-size: 20px; background: #fff; color: #000; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #final-score { margin-bottom: 20px; font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui"><div id="score">0</div></div>
        <div id="menu">
            <h1 id="menu-title">COLOR SWITCH</h1>
            <p class="instructions">PRESS SPACE, TAP, OR CLICK TO JUMP</p>
            <div id="final-score" class="hidden">0</div>
            <button id="start-btn" class="btn">PLAY</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

function resize() {
    const container = document.getElementById('game-container');
    viewportWidth = container.clientWidth;
    viewportHeight = container.clientHeight;
    canvas.width = viewportWidth;
    canvas.height = viewportHeight;
}
window.addEventListener('resize', resize);
resize();

function playSound(freq, type = 'sine', duration = 0.1) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}
