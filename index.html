<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crafty Bird: Ruins Descent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --mc-green: #5aa35a;
            --mc-dirt: #866043;
            --mc-stone: #7a7a7a;
            --font-pixel: 'VT323', monospace;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: var(--font-pixel);
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            border: 6px solid #333;
            image-rendering: pixelated;
        }

        canvas {
            display: block;
            background-color: #4eb3e9;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        #score-display {
            font-size: 60px;
            margin-top: 20px;
            text-shadow: 4px 4px 0 #000;
        }

        .menu-screen {
            background: rgba(0, 0, 0, 0.85);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            text-align: center;
        }

        h1 { font-size: 50px; color: #5eff5e; text-shadow: 3px 3px 0 #004400; margin-bottom: 10px; }

        .btn {
            background: #7a7a7a;
            border: 4px solid #fff;
            color: white;
            padding: 10px 30px;
            font-size: 28px;
            font-family: var(--font-pixel);
            cursor: pointer;
            margin: 10px;
            box-shadow: inset -4px -4px 0 #444, inset 4px 4px 0 #aaa;
        }

        .btn:hover { background: #8a8a8a; }
        .btn:active { transform: scale(0.95); }

        .skin-selector {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .skin-option {
            width: 70px;
            height: 70px;
            border: 4px solid #444;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
            transition: all 0.2s;
        }

        .skin-option.selected { border-color: #5eff5e; background: #444; transform: scale(1.1); }

        .preview-box { width: 40px; height: 30px; position: relative; }
        
        /* Chicken - Classic Bird */
        .p-default { background: #fff; border-bottom: 4px solid #ccc; box-shadow: 10px 0 0 #f00; }
        
        /* Steve */
        .p-steve { background: #2e8b57; }
        .p-steve::before { content: ''; position: absolute; left: 0; top: 0; width: 20px; height: 15px; background: #ffdbac; }
        
        /* Ender-Bird - High Contrast Difference */
        .p-ender { background: #222; box-shadow: 0 0 10px #ff00ff; border: 1px solid #ff00ff; }
        .p-ender::after { content: ''; position: absolute; right: 5px; top: 5px; width: 6px; height: 6px; background: #ff00ff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="score-display">0</div>

        <div id="start-menu" class="menu-screen">
            <h1>CRAFTY BIRD</h1>
            <p style="font-size: 24px;">SELECT SKIN</p>
            <div class="skin-selector">
                <div class="skin-option selected" data-skin="default" title="Chicken">
                    <div class="preview-box p-default"></div>
                </div>
                <div class="skin-option" data-skin="steve" title="Steve">
                    <div class="preview-box p-steve"></div>
                </div>
                <div class="skin-option" data-skin="ender" title="Ender Bird">
                    <div class="preview-box p-ender"></div>
                </div>
            </div>
            <button id="start-btn" class="btn">START GAME</button>
            <p style="font-size: 18px; color: #5eff5e; margin-top: 10px;">RARE CREEPER ALERT!</p>
        </div>

        <div id="game-over-menu" class="menu-screen hidden">
            <h1 style="color: #ff5e5e;">WASTED</h1>
            <p style="font-size: 32px;">SCORE: <span id="final-score">0</span></p>
            <p style="font-size: 24px;">BEST: <span id="best-score">0</span></p>
            <button id="restart-btn" class="btn">RESPAWN</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score-display');
const startMenu = document.getElementById('start-menu');
const gameOverMenu = document.getElementById('game-over-menu');

const WIDTH = 360;
const HEIGHT = 560;
const GRAVITY = 0.25;
const JUMP = -5.2;
const SPEED = 2.5;
const PIPE_GAP = 165;
const SPAWN_RATE = 100;

canvas.width = WIDTH;
canvas.height = HEIGHT;

let gameState = 'START';
let frameCount = 0;
let score = 0;
let highScore = localStorage.getItem('mcBirdBest') || 0;
let activeSkin = 'default';
let pipesPassed = 0;
let nextCreeperPipe = Math.floor(Math.random() * 8) + 8;

let bird;
let pipes = [];
let particles = [];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(f, t, d, v=0.05) {
    try {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.value = f; g.gain.value = v;
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    } catch(e){}
}

class Particle {
    constructor(x, y, color, size = 4) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.color = color;
        this.life = 1.0;
        this.size = size;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.life -= 0.02; }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

class Bird {
    constructor() { this.reset(); }
    reset() {
        this.x = 60; this.y = HEIGHT / 2;
        this.w = 34; this.h = 24;
        this.vy = 0; this.angle = 0;
    }
    flap() { this.vy = JUMP; playSound(300, 'square', 0.1); }
    update() {
        this.vy += GRAVITY;
        this.y += this.vy;
        this.angle = Math.min(Math.PI/4, Math.max(-Math.PI/4, this.vy * 0.1));
        if (this.y + 12 > HEIGHT - 40 || this.y - 12 < 0) return true;
        return false;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        if (activeSkin === 'default') {
            // White Chicken
            ctx.fillStyle = '#FFFFFF'; ctx.fillRect(-15, -10, 30, 20); // Body
            ctx.fillStyle = '#FF0000'; ctx.fillRect(10, -5, 8, 10);    // Wattles
            ctx.fillStyle = '#000000'; ctx.fillRect(8, -8, 3, 3);      // Eye
            ctx.fillStyle = '#FFA500'; ctx.fillRect(12, -2, 8, 5);     // Beak
        } else if (activeSkin === 'steve') {
            // Steve
            ctx.fillStyle = '#2e8b57'; ctx.fillRect(-15, -10, 30, 20);
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(-15, -10, 15, 10);
            ctx.fillStyle = '#4b3621'; ctx.fillRect(-15, -12, 15, 4);
        } else {
            // Ender Bird
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-15, -10, 30, 20);
            ctx.fillStyle = '#ff00ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff00ff';
            ctx.fillRect(5, -8, 5, 5); // Ender Eye
            ctx.shadowBlur = 0;
        }
        ctx.restore();
    }
}

class Pipe {
    constructor(x, isCreeperPipe = false) {
        this.x = x;
        this.w = 64;
        this.top = 100 + Math.random() * (HEIGHT - PIPE_GAP - 200);
        this.passed = false;
        this.hasEmerald = Math.random() > 0.6;
        this.emeraldY = this.top + PIPE_GAP/2;
        
        this.hasCreeper = isCreeperPipe;
        this.creeperFuse = 0; 
        this.isExploded = false;
    }
    update() {
        this.x -= SPEED;
        if (this.hasCreeper && !this.isExploded && bird) {
            let dx = (this.x + this.w/2) - bird.x;
            let dy = (this.top + PIPE_GAP) - bird.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < 120) {
                this.creeperFuse++;
                if (frameCount % 8 === 0) playSound(2200, 'white', 0.04, 0.02);
                if (this.creeperFuse > 50) {
                    this.isExploded = true;
                    this.burst();
                }
            } else {
                this.creeperFuse = Math.max(0, this.creeperFuse - 1);
            }
        }
    }
    burst() {
        playSound(80, 'sawtooth', 0.6, 0.2);
        // Explosion particles
        for(let i=0; i<30; i++) {
            particles.push(new Particle(this.x + this.w/2, this.top + PIPE_GAP, '#5eff5e', 6));
            particles.push(new Particle(this.x + this.w/2, this.top + PIPE_GAP, '#333', 4));
        }
    }
    draw() {
        // Detailed Cobblestone Texture
        this.drawTexturedRect(this.x, 0, this.w, this.top, true);
        const bY = this.top + PIPE_GAP;
        this.drawTexturedRect(this.x, bY, this.w, HEIGHT - bY, false);

        // Pipe Mouths
        ctx.fillStyle = '#8a8a8a';
        ctx.fillRect(this.x - 4, this.top - 20, this.w + 8, 20);
        ctx.strokeRect(this.x - 4, this.top - 20, this.w + 8, 20);
        ctx.fillRect(this.x - 4, bY, this.w + 8, 20);
        ctx.strokeRect(this.x - 4, bY, this.w + 8, 20);

        // Creeper Vines
        ctx.fillStyle = '#2d4c1e';
        for(let v=0; v<2; v++) {
            let vx = this.x + 10 + (v*30);
            ctx.fillRect(vx, 0, 8, this.top - 20);
            ctx.fillRect(vx, bY + 20, 8, HEIGHT - bY);
            // Vine leaves
            ctx.fillStyle = '#3e6b28';
            for(let l=0; l<5; l++) {
                ctx.fillRect(vx-2, l*40, 12, 6);
                ctx.fillRect(vx-2, bY + 40 + (l*40), 12, 6);
            }
        }

        if (this.hasEmerald) {
            ctx.fillStyle = '#5eff5e';
            ctx.beginPath();
            ctx.moveTo(this.x + this.w/2, this.emeraldY - 12);
            ctx.lineTo(this.x + this.w/2 + 10, this.emeraldY);
            ctx.lineTo(this.x + this.w/2, this.emeraldY + 12);
            ctx.lineTo(this.x + this.w/2 - 10, this.emeraldY);
            ctx.closePath();
            ctx.fill();
        }

        if (this.hasCreeper && !this.isExploded) {
            ctx.save();
            let flash = (this.creeperFuse > 0 && Math.floor(this.creeperFuse/4) % 2 === 0);
            ctx.fillStyle = flash ? '#ffffff' : '#5eff5e';
            const cx = this.x + 20, cy = bY - 35;
            ctx.fillRect(cx, cy, 24, 35); // Body
            ctx.fillStyle = 'black';
            ctx.fillRect(cx + 4, cy + 6, 5, 5); // Eye
            ctx.fillRect(cx + 15, cy + 6, 5, 5); // Eye
            ctx.fillRect(cx + 8, cy + 14, 8, 8); // Mouth
            ctx.restore();
        }
    }

    drawTexturedRect(x, y, w, h, isTop) {
        ctx.fillStyle = '#7a7a7a';
        ctx.fillRect(x, y, w, h);
        // Cobble pattern
        ctx.fillStyle = '#5a5a5a';
        for(let r=0; r < h; r += 16) {
            for(let c=0; c < w; c += 16) {
                if((r+c)%32===0) ctx.fillRect(x+c, y+r, 12, 12);
            }
        }
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);
    }
}

function init() {
    bird = new Bird();
    pipes = [];
    particles = [];
    score = 0;
    pipesPassed = 0;
    frameCount = 0;
    scoreDisplay.innerText = '0';
    nextCreeperPipe = Math.floor(Math.random() * 8) + 8;
}

function startGame() {
    init();
    gameState = 'PLAYING';
    startMenu.classList.add('hidden');
    gameOverMenu.classList.add('hidden');
    scoreDisplay.classList.remove('hidden');
}

function endGame() {
    if (gameState === 'GAMEOVER') return;
    gameState = 'GAMEOVER';
    playSound(60, 'sawtooth', 0.5, 0.2);
    // Burst animation for bird
    for(let i=0; i<20; i++) {
        particles.push(new Particle(bird.x, bird.y, activeSkin === 'ender' ? '#ff00ff' : '#f7e214', 5));
    }
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('mcBirdBest', highScore);
    }
    document.getElementById('final-score').innerText = score;
    document.getElementById('best-score').innerText = highScore;
    gameOverMenu.classList.remove('hidden');
}

const handleAction = () => {
    if (gameState === 'PLAYING' && bird) bird.flap();
};

window.addEventListener('keydown', e => { if(e.code === 'Space' || e.code === 'ArrowUp') handleAction(); });
canvas.addEventListener('mousedown', (e) => { if(e.target === canvas) handleAction(); });
canvas.addEventListener('touchstart', e => { if(e.target === canvas) { e.preventDefault(); handleAction(); } }, {passive:false});

document.querySelectorAll('.skin-option').forEach(opt => {
    opt.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.skin-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        activeSkin = opt.dataset.skin;
        playSound(600, 'sine', 0.05);
    });
});

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

function update() {
    if (gameState === 'PLAYING' && bird) {
        frameCount++;
        if (bird.update()) endGame();

        if (frameCount % SPAWN_RATE === 0) {
            pipesPassed++;
            let isCreeper = (pipesPassed === nextCreeperPipe);
            if (isCreeper) {
                nextCreeperPipe = pipesPassed + Math.floor(Math.random() * 8) + 8;
            }
            pipes.push(new Pipe(WIDTH + 50, isCreeper));
        }

        for (let i = pipes.length - 1; i >= 0; i--) {
            pipes[i].update();
            const p = pipes[i];

            if (bird.x + 12 > p.x && bird.x - 12 < p.x + p.w) {
                if (bird.y - 10 < p.top || bird.y + 10 > p.top + PIPE_GAP) endGame();
                
                if (p.hasEmerald && Math.abs(bird.y - p.emeraldY) < 25) {
                    p.hasEmerald = false;
                    score += 5;
                    scoreDisplay.innerText = score;
                    playSound(1200, 'sine', 0.1, 0.1);
                    for(let j=0; j<5; j++) particles.push(new Particle(bird.x, bird.y, '#5eff5e', 3));
                }
                
                if (p.hasCreeper && !p.isExploded && bird.y + 10 > p.top + PIPE_GAP - 35) {
                    endGame();
                }
            }

            if (!p.passed && p.x + p.w < bird.x) {
                p.passed = true;
                score++;
                scoreDisplay.innerText = score;
                playSound(800, 'sine', 0.05);
            }

            if (p.x < -100) pipes.splice(i, 1);
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
}

function drawBackground() {
    // Minecraft Sky
    ctx.fillStyle = '#4eb3e9';
    ctx.fillRect(0,0,WIDTH,HEIGHT);
    
    // Square Sun
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(WIDTH - 100, 60, 40, 40);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.fillRect(WIDTH - 110, 50, 60, 60);

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillRect(40, 120, 80, 30); 
    ctx.fillRect(200, 180, 100, 35);
    
    // Distant Hills
    ctx.fillStyle = '#4a8b4a';
    ctx.fillRect(0, HEIGHT - 100, WIDTH, 60);

    // Floor
    ctx.fillStyle = '#866043'; ctx.fillRect(0, HEIGHT - 40, WIDTH, 40);
    ctx.fillStyle = '#5aa35a'; ctx.fillRect(0, HEIGHT - 45, WIDTH, 10);
    
    // Floor details
    ctx.fillStyle = '#4a8b4a';
    for(let f=0; f<WIDTH; f+=40) ctx.fillRect(f, HEIGHT-45, 15, 5);
}

function loop() {
    ctx.clearRect(0,0,WIDTH,HEIGHT);
    drawBackground();
    
    if (pipes && pipes.length > 0) {
        pipes.forEach(p => p.draw());
    }
    
    if (bird && gameState !== 'GAMEOVER') bird.draw();
    
    if (particles && particles.length > 0) {
        particles.forEach(p => p.draw());
    }
    
    update();
    requestAnimationFrame(loop);
}

bird = new Bird();
pipes = [];
particles = [];
loop();
</script>
</body>
</html>
